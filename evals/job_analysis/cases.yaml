cases:
  - id: ai-platform-backend-strong-fit
    name: "Senior backend role building AI platform workflows"
    description: "Should be recommended because it combines backend ownership, workflow orchestration, cloud, and LLM platform direction."
    source_url: "https://example.com/jobs/ai-platform-backend"
    job_description: |
      Senior Backend Engineer, AI Platform
      Company: Example AI Cloud
      Location: Seattle or Remote

      Build production backend services for an internal AI agent platform. You will design APIs,
      distributed workflow orchestration, Python services, cloud infrastructure integrations, and
      observability for long-running LLM tool execution. Experience with AWS, serverless systems,
      Kubernetes, and vector databases is helpful.
    expectations:
      min_score: 70
      priority: "high"
      recommendation: "apply"
      required:
        - field: "parsed.skills"
          terms: ["backend", "workflow orchestration", "cloud", "llm"]
      forbidden:
        - field: "fit.gaps"
          terms: ["Kubernetes", "Docker", "RAG"]
        - field: "fit.concern_codes"
          terms: ["research_mismatch", "frontend_heavy", "prompt_tooling_heavy"]

  - id: research-scientist-low-fit
    name: "Research scientist role with PhD-heavy requirements"
    description: "Should be treated as low fit for a backend/platform transition because the role centers on research, publication, and PhD depth."
    source_url: "https://example.com/jobs/research-scientist"
    job_description: |
      Research Scientist, Foundation Models
      Company: Example Research Lab
      Location: San Francisco

      We are looking for a PhD research scientist to invent new model architectures,
      publish papers at top conferences, and lead novel training research. The role requires
      deep expertise in machine learning theory, large-scale experiments, and research publications.
      Backend service work is minimal.
    expectations:
      max_score: 64
      priority: "low"
      recommendation: "skip"
      required:
        - field: "fit.concern_codes"
          terms: ["research_mismatch"]
      forbidden:
        - field: "fit.summary"
          terms: ["Strong fit"]

  - id: backend-no-rag-hallucination
    name: "Backend platform role without RAG requirements"
    description: "Should not invent retrieval-augmented generation as a skill gap when the posting does not mention retrieval, vector search, embeddings, or RAG."
    source_url: "https://example.com/jobs/backend-platform-no-rag"
    job_description: |
      Senior Backend Engineer, Platform Workflows
      Company: Example Cloud Platform
      Location: Remote

      Build Python and Java backend services for distributed workflow orchestration.
      Design APIs, improve service reliability, support operational dashboards, and
      integrate with cloud infrastructure services. Experience with Kubernetes is helpful.
    expectations:
      min_score: 65
      required:
        - field: "fit.strong_matches"
          terms: ["backend"]
      forbidden:
        - field: "fit.gaps"
          terms: ["RAG", "retrieval augmented generation", "vector database", "embeddings"]
        - field: "fit.gap_codes"
          terms: ["production_ai_experience"]
        - field: "guidance.learning_plan"
          terms: ["RAG", "retrieval augmented generation"]
      no_duplicates:
        - "fit.concerns"

  - id: language-alternatives-not-hard-gap
    name: "Alternative programming languages should not become hard blockers"
    description: "If a job accepts Java as one of several languages, analysis should not claim C# or C++ are required gaps for a Java-capable backend profile."
    source_url: "https://example.com/jobs/language-alternatives"
    job_description: |
      Software Engineer, Distributed Systems
      Company: Example Productivity
      Location: Redmond

      Responsibilities include building scalable backend services, distributed systems,
      and API integrations. Required qualifications include professional experience
      with one or more programming languages such as Java, C#, C++, Python, or JavaScript.
      Preferred qualifications include experience with cloud platforms and service reliability.
    expectations:
      min_score: 65
      required:
        - field: "parsed.accepted_skill_alternatives"
          terms: ["Java"]
      forbidden:
        - field: "fit.gaps"
          terms: ["C#", "C++", "JavaScript"]
        - field: "fit.concerns"
          terms: ["requires proficiency in C#"]
      no_duplicates:
        - "fit.concerns"
      require_evidence:
        - field: "fit.gaps"

  - id: preferred-ml-depth-not-blocker
    name: "Preferred ML depth should be treated as growth area, not blocker"
    description: "Preferred ML evaluation/training exposure can be a learning area, but should not be framed as a hard blocker for a backend/platform role."
    source_url: "https://example.com/jobs/backend-ml-preferred"
    job_description: |
      Backend Engineer, AI Developer Platform
      Company: Example AI Tools
      Location: New York

      Build backend APIs, orchestration services, and developer workflows for an AI
      platform team. Required qualifications include Python or Java backend experience,
      distributed systems fundamentals, and cloud service ownership.

      Preferred qualifications include familiarity with ML evaluation, model training
      workflows, and experimentation platforms.
    expectations:
      min_score: 65
      required:
        - field: "fit.growth_area_codes"
          terms: ["ml_evaluation_growth"]
      forbidden:
        - field: "fit.gaps"
          terms: ["Deep understanding of ML evaluation and training mechanisms", "ML evaluation and training mechanisms"]
        - field: "fit.gap_codes"
          terms: ["production_ai_experience"]
        - field: "fit.concerns"
          terms: ["blocker", "hard requirement"]
      no_duplicates:
        - "fit.concerns"
        - "fit.gaps"

  - id: frontend-prompt-tooling-low-fit
    name: "Frontend prompt-tooling role"
    description: "Should be penalized because it is frontend and prompt-tooling heavy without enough backend/platform ownership."
    source_url: "https://example.com/jobs/frontend-prompt-tooling"
    job_description: |
      AI Prompt Tooling Frontend Engineer
      Company: Example Productivity
      Location: Remote

      Build React interfaces for prompt engineers to create, label, and organize prompt templates.
      Most work is frontend UI development, user-facing workflow screens, prompt library management,
      and data labeling operations support. Backend infrastructure ownership is limited.
    expectations:
      max_score: 60
      priority: "low"
      recommendation: "skip"
      required:
        - field: "fit.concern_codes"
          terms: ["frontend_heavy", "prompt_tooling_heavy"]
      forbidden:
        - field: "fit.summary"
          terms: ["Strong fit"]
